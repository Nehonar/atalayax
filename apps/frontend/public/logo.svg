  <!-- Pulse / heartbeat line -->
  <polyline
    points="8,91 42,91 54,91 64,62 76,120 86,72 96,91 104,91 114,62 126,120 136,72 146,91 158,91 192,91"
    stroke="#06b6d4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
